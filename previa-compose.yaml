version: 1
main:
  address: 0.0.0.0
  port: 5588
  env:
    MCP_ENABLED: "true"
    RUST_LOG: info
    PREVIA_QUEUE_JOB_LEASE_MS: "30000"
runners:
  local:
    address: 127.0.0.1
    count: 2
    port_range:
      start: 55880
      end: 55889
    env:
      RUST_LOG: info
      PREVIA_RUNNER_POOL: default
      PREVIA_RUNNER_SUPPORTED_KINDS: e2e,load
      PREVIA_RUNNER_MAX_E2E_SLOTS: "1"
      PREVIA_RUNNER_MAX_LOAD_SLOTS: "1"
