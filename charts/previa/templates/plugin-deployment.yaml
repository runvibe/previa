{{- if .Values.kubernetesPlugin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "previa.pluginName" . }}
  labels:
    {{- include "previa.labels" . | nindent 4 }}
    app.kubernetes.io/component: kubernetes-plugin
spec:
  replicas: {{ .Values.kubernetesPlugin.replicas }}
  selector:
    matchLabels:
      {{- include "previa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: kubernetes-plugin
  template:
    metadata:
      annotations:
        {{- toYaml .Values.kubernetesPlugin.podAnnotations | nindent 8 }}
      labels:
        {{- include "previa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kubernetes-plugin
        {{- with .Values.kubernetesPlugin.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "previa.pluginServiceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: previa-kubernetes-plugin
          image: "{{ .Values.kubernetesPlugin.image.repository }}:{{ .Values.kubernetesPlugin.image.tag }}"
          imagePullPolicy: {{ .Values.kubernetesPlugin.image.pullPolicy }}
          env:
            - name: ADDRESS
              value: "0.0.0.0"
            - name: PORT
              value: {{ .Values.kubernetesPlugin.containerPort | quote }}
            - name: PREVIA_PLUGIN_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ required "kubernetesPlugin.database.existingSecret is required for production installs" .Values.kubernetesPlugin.database.existingSecret | quote }}
                  key: {{ .Values.kubernetesPlugin.database.urlKey | quote }}
            - name: PREVIA_RUNNER_IMAGE
              value: "{{ .Values.kubernetesPlugin.runnerImage.repository }}:{{ .Values.kubernetesPlugin.runnerImage.tag }}"
            - name: PREVIA_RUNNER_INSTALL_ENABLED
              value: {{ .Values.kubernetesPlugin.runnerInstall.enabled | quote }}
            {{- if .Values.kubernetesPlugin.runnerInstall.urlTemplate }}
            - name: PREVIA_RUNNER_INSTALL_URL_TEMPLATE
              value: {{ .Values.kubernetesPlugin.runnerInstall.urlTemplate | quote }}
            {{- end }}
            {{- range $name, $value := .Values.kubernetesPlugin.env }}
            {{- if and (eq $name "PREVIA_RUNNER_NAMESPACE") (empty $value) }}
            - name: {{ $name }}
              value: {{ $.Release.Namespace | quote }}
            {{- else }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.kubernetesPlugin.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.kubernetesPlugin.containerPort }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.kubernetesPlugin.resources | nindent 12 }}
      {{- with .Values.kubernetesPlugin.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kubernetesPlugin.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kubernetesPlugin.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
