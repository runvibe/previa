nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

main:
  replicas: 2
  image:
    repository: ghcr.io/runvibe/main
    tag: "1.0.0-alpha.40"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5588
  database:
    existingSecret: ""
    urlKey: ORCHESTRATOR_DATABASE_URL
  env:
    PREVIA_APP_ENABLED: "true"
    MCP_ENABLED: "false"
    RUST_LOG: info
    RUNNER_RPS_PER_NODE: "1000"
    PREVIA_KUBERNETES_READY_TIMEOUT_SECONDS: "300"
    PREVIA_KUBERNETES_POLL_MS: "1000"
  extraEnv: []
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

kubernetesPlugin:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/runvibe/previa-kubernetes-plugin
    tag: "1.0.0-alpha.40"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 55980
  database:
    existingSecret: ""
    urlKey: PREVIA_PLUGIN_DATABASE_URL
  env:
    RUST_LOG: info
    PREVIA_RECONCILE_INTERVAL_MS: "1000"
    PREVIA_RESERVATION_TTL_SECONDS: "300"
    PREVIA_IDLE_TTL_SECONDS: "300"
    PREVIA_PROVISION_TIMEOUT_SECONDS: "300"
    PREVIA_RUNNER_NAMESPACE: ""
    PREVIA_RUNNER_PORT: "7373"
    PREVIA_RUNNER_SERVICE_NAME: previa-runner
    PREVIA_KARPENTER_NODE_POOL: previa-runner-small
    PREVIA_RUNNER_CPU_REQUEST: 100m
    PREVIA_RUNNER_MEMORY_REQUEST: 128Mi
    PREVIA_RUNNER_CPU_LIMIT: 500m
    PREVIA_RUNNER_MEMORY_LIMIT: 512Mi
    PREVIA_RUNNER_EXCLUSIVE_NODES: "true"
    PREVIA_RUNNER_EXCLUSIVE_NODE_LABEL_KEY: previa.runvibe.com/node-role
    PREVIA_RUNNER_EXCLUSIVE_NODE_LABEL_VALUE: runner
    PREVIA_RUNNER_EXCLUSIVE_TAINT_KEY: previa.runvibe.com/runner-only
    PREVIA_RUNNER_EXCLUSIVE_TAINT_VALUE: "true"
    PREVIA_RUNNER_EXCLUSIVE_TAINT_EFFECT: NoSchedule
  runnerImage:
    repository: ghcr.io/runvibe/runner
    tag: "1.0.0-alpha.40"
  runnerInstall:
    enabled: false
    urlTemplate: ""
  extraEnv: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  rbac:
    create: true
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: previa.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

networkPolicy:
  enabled: false
